<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — CastWheelz</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a; --dark: #111214; --card-bg: #161819; --border: #2a2b2e;
    --gold: #c9a84c; --white: #f4f2ee; --muted: #7a7d88;
  }
  body { background: var(--black); color: var(--white); font-family: 'DM Sans', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
  
  .auth-card { background: var(--card-bg); border: 1px solid var(--border); padding: 4rem 3rem; border-radius: 16px; width: 100%; max-width: 440px; text-align: center; box-shadow: 0 24px 64px rgba(0,0,0,0.8); }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: 48px; color: var(--gold); margin: 0 0 10px; letter-spacing: 2px; cursor: pointer; }
  
  button { width: 100%; background: var(--white); color: var(--black); border: none; padding: 16px; font-weight: 600; cursor: pointer; border-radius: 6px; margin-top: 2rem; font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; transition: opacity 0.2s; }
  button:hover { opacity: 0.9; }
</style>
</head>
<body>

<div class="auth-card">
  <h1 onclick="window.location.href='index.html'">CASTWHEELZ</h1>
  <p style="color:var(--muted); font-size:15px; margin-bottom:2rem;">Secure collector profile verification.</p>
  
  <button id="googleLoginBtn">
    <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
    Login / Signup with Google
  </button>
  <div id="msg" style="margin-top: 15px; font-size: 13px; color: var(--gold);"></div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
  const supabase = createClient('https://cjzvweakirjbmmacrqpk.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNqenZ3ZWFraXJqYm1tYWNycXBrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MTE4OTcsImV4cCI6MjA5NTA4Nzg5N30.OxP-RUwhi2i7OlFLZruBEh9MjgXhbkzYWT55mEDb-Hg')
  
  // If already logged in, send them home.
  supabase.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.href = 'index.html';
  });

  document.getElementById('googleLoginBtn').onclick = async () => {
    document.getElementById('msg').textContent = "Redirecting to Google secure gateway...";
    await supabase.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.origin + '/index.html' }
    });
  }
</script>
</body>
</html>

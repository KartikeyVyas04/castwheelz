<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Model Details — CastWheelz</title>
<link rel="icon" href="data:;base64,iVBORw0KGgo=">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --black: #0a0a0a; --card-bg: #161819; --border: #2a2b2e; --gold: #c9a84c; --white: #f4f2ee; --muted: #7a7d88; --font-display: 'Bebas Neue', sans-serif; --font-body: 'DM Sans', sans-serif; }
  body { background: var(--black); color: var(--white); font-family: var(--font-body); margin: 0; padding-top: 80px; }
  nav { position: fixed; top: 0; left: 0; right: 0; background: rgba(10,10,10,0.92); border-bottom: 1px solid var(--border); height: 68px; display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; z-index: 100; }
  .logo { font-family: var(--font-display); font-size: 26px; color: var(--gold); text-decoration: none; }
  .logo span { color: var(--white); }
  
  .container { max-width: 1100px; margin: 2rem auto; padding: 0 1rem; display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center; }
  .img-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 4rem; text-align: center; }
  .img-box svg { width: 100%; max-width: 400px; }
  
  h1 { font-family: var(--font-display); font-size: 48px; margin: 0 0 10px; line-height: 1; }
  .meta { color: var(--gold); font-weight: 600; text-transform: uppercase; margin-bottom: 1rem; }
  .desc { color: var(--muted); margin-bottom: 2rem; line-height: 1.6; }
  .price { font-family: var(--font-display); font-size: 42px; margin-bottom: 2rem; }
  
  .btn-add { background: var(--gold); color: #000; border: none; padding: 16px; font-weight: bold; text-transform: uppercase; border-radius: 6px; width: 100%; cursor: pointer; transition: 0.2s; }
  .btn-add:hover:not(:disabled) { opacity: 0.8; }
  .btn-add:disabled { opacity: 0.5; }

  @media(max-width: 768px) { .container { grid-template-columns: 1fr; gap: 2rem; } .img-box{padding: 2rem;} }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">CAST<span>WHEELZ</span></a>
  <button onclick="window.location.href='cart.html'" style="background:none;border:1px solid var(--border);color:white;padding:8px 16px;border-radius:6px;cursor:pointer;">Cart</button>
</nav>

<div class="container" id="view"><p style="grid-column:1/-1;text-align:center;">Loading model specifications...</p></div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
  const supabase = createClient('https://cjzvweakirjbmmacrqpk.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNqenZ3ZWFraXJqYm1tYWNycXBrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MTE4OTcsImV4cCI6MjA5NTA4Nzg5N30.OxP-RUwhi2i7OlFLZruBEh9MjgXhbkzYWT55mEDb-Hg')
  
  const id = new URLSearchParams(window.location.search).get('id');

  async function loadData() {
    const { data: p } = await supabase.from('products').select('*').eq('id', id).single();
    if(!p) return document.getElementById('view').innerHTML = "Product not found.";
    
    const price = p.discount_price ? p.discount_price : p.price;

    document.getElementById('view').innerHTML = `
      <div class="img-box">
        <svg viewBox="0 0 280 160" fill="none"><path d="M40 110 L55 80 L85 62 L110 55 L175 54 L210 58 L240 78 L255 105 L255 118 L40 118 Z" fill="#222" stroke="#c9a84c" stroke-width="2"/></svg>
      </div>
      <div>
        <button onclick="window.history.back()" style="background:none;border:none;color:var(--muted);cursor:pointer;margin-bottom:10px;text-transform:uppercase;font-weight:bold;">&larr; Back</button>
        <h1>${p.name}</h1>
        <div class="meta">${p.brand} | Scale ${p.scale}</div>
        <p class="desc">${p.description}</p>
        <div class="price">₹${price/100}</div>
        <button class="btn-add" onclick="pushToCart('${p.id}', this)">Allocate to Cart</button>
      </div>
    `;
  }

  window.pushToCart = async (pid, btn) => {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) return window.location.href = 'login.html';
    
    btn.disabled = true; btn.textContent = "Processing...";
    
    try {
      const { data: exist } = await supabase.from('cart_items').select('id, quantity').eq('profile_id', session.user.id).eq('product_id', pid).maybeSingle();
      if(exist) {
        await supabase.from('cart_items').update({ quantity: exist.quantity + 1 }).eq('id', exist.id);
      } else {
        const { error } = await supabase.from('cart_items').insert({ profile_id: session.user.id, product_id: pid, quantity: 1 });
        if(error) {
          const { data: retry } = await supabase.from('cart_items').select('id, quantity').eq('profile_id', session.user.id).eq('product_id', pid).maybeSingle();
          if(retry) await supabase.from('cart_items').update({ quantity: retry.quantity + 1 }).eq('id', retry.id);
        }
      }
    } catch(e) { console.error(e); }
    
    window.location.href = 'cart.html';
  }

  loadData();
</script>
</body>
</html>

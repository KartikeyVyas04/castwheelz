<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CastWheelz — Premium Die Cast Models</title>
<link rel="icon" href="data:;base64,iVBORw0KGgo=">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --black: #0a0a0a; --dark: #111214; --card-bg: #161819; --border: #2a2b2e; --gold: #c9a84c; --gold-light: #e8c97a; --silver: #b8bcc8; --white: #f4f2ee; --muted: #7a7d88; --font-display: 'Bebas Neue', sans-serif; --font-body: 'DM Sans', sans-serif; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: var(--black); color: var(--white); font-family: var(--font-body); font-size: 15px; line-height: 1.6; }

  nav { position: fixed; top: 0; width: 100%; z-index: 100; background: rgba(10,10,10,0.92); backdrop-filter: blur(18px); border-bottom: 1px solid var(--border); height: 68px; display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; }
  .logo { font-family: var(--font-display); font-size: 26px; letter-spacing: 2px; color: var(--gold); text-decoration: none; }
  .logo span { color: var(--white); }
  .nav-right { display: flex; align-items: center; gap: 1rem; }
  
  .btn-nav { background: none; border: 1px solid var(--border); color: var(--white); border-radius: 6px; padding: 7px 14px; font-size: 13px; font-weight: 500; cursor: pointer; text-transform: uppercase; font-family: inherit; }
  .btn-nav:hover { border-color: var(--gold); color: var(--gold); }
  .btn-cart { background: var(--gold); border: none; color: var(--black); border-radius: 6px; padding: 7px 16px; font-size: 13px; font-weight: 600; cursor: pointer; text-transform: uppercase; font-family: inherit; display:flex; align-items:center; gap:6px; }

  .hero { min-height: 70vh; padding-top: 68px; display: flex; align-items: center; justify-content: center; text-align: center; background: radial-gradient(ellipse 80% 60% at 50% 50%, rgba(201,168,76,0.07) 0%, transparent 65%); border-bottom: 1px solid var(--border); }
  .hero h1 { font-family: var(--font-display); font-size: clamp(40px, 6vw, 76px); line-height: 1; color: var(--white); margin-bottom: 1rem; }
  .hero h1 span { color: var(--gold); }
  .hero p { color: var(--muted); max-width: 500px; margin: 0 auto 2rem; }

  .section { max-width: 1280px; margin: 0 auto; padding: 4rem 1rem; }
  .section-title { font-family: var(--font-display); font-size: 32px; margin-bottom: 2rem; }

  .cat-grid { display: flex; gap: 1rem; overflow-x: auto; padding-bottom: 1rem; margin-bottom: 2rem; scrollbar-width: none; }
  .cat-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 20px; cursor: pointer; white-space: nowrap; font-weight: 500; font-size: 13px; text-transform: uppercase; }
  .cat-card.active, .cat-card:hover { border-color: var(--gold); color: var(--gold); }

  .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.5rem; }
  .product-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; transition: transform 0.2s; }
  .product-card:hover { border-color: rgba(201,168,76,0.5); transform: translateY(-4px); }
  .product-img { background: #111; height: 180px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .product-img svg { width: 60%; }
  .product-info { padding: 1.2rem; display: flex; flex-direction: column; flex-grow: 1; }
  .product-scale { font-size: 11px; color: var(--gold); font-weight: 600; text-transform: uppercase; margin-bottom: 4px; }
  .product-name { font-weight: 600; font-size: 16px; margin-bottom: 8px; cursor: pointer; min-height: 45px; }
  .price { font-family: var(--font-display); font-size: 24px; color: var(--gold); margin-top: auto; }
  .btn-add { background: none; border: 1px solid var(--border); color: var(--white); border-radius: 6px; padding: 10px; font-weight: 600; cursor: pointer; text-transform: uppercase; margin-top: 15px; width: 100%; transition: 0.2s; }
  .btn-add:hover:not(:disabled) { background: var(--gold); color: var(--black); }
  .btn-add:disabled { opacity: 0.5; cursor: not-allowed; }

  .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 1100; background: var(--card-bg); border: 1px solid var(--gold); border-radius: 8px; padding: 12px 18px; transform: translateX(150%); transition: transform 0.3s; }
  .toast.show { transform: translateX(0); }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">CAST<span>WHEELZ</span></a>
  <div class="nav-right">
    <button class="btn-nav" id="authBtn" onclick="window.location.href='login.html'">Login</button>
    <button class="btn-cart" onclick="window.location.href='cart.html'">Cart (<span id="cartBadge">0</span>)</button>
  </div>
</nav>

<header class="hero">
  <div>
    <h1>Precision <span>Die-Cast</span> Fleet</h1>
    <p>Authentic museum-grade scaled replicas synchronised directly to secure system ledgers.</p>
    <button class="btn-cart" style="margin: 0 auto; padding: 12px 24px;" onclick="document.getElementById('shop').scrollIntoView()">Explore Catalog</button>
  </div>
</header>

<main class="section" id="shop">
  <div class="cat-grid" id="categoriesBox">
    <div class="cat-card active" onclick="setFilter(null, this)">All Scales</div>
  </div>
  
  <div class="products-grid" id="productBox">
    <p style="color:var(--muted)">Loading catalog...</p>
  </div>
</main>

<div class="toast" id="toastBox">Item added to cart securely.</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
  const supabase = createClient('https://cjzvweakirjbmmacrqpk.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNqenZ3ZWFraXJqYm1tYWNycXBrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MTE4OTcsImV4cCI6MjA5NTA4Nzg5N30.OxP-RUwhi2i7OlFLZruBEh9MjgXhbkzYWT55mEDb-Hg')
  
  let userSession = null;
  let activeCat = null;

  async function init() {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      userSession = session.user;
      document.getElementById('authBtn').textContent = 'Logout';
      document.getElementById('authBtn').onclick = async () => { await supabase.auth.signOut(); window.location.reload(); }
      updateBadge();
    }
    fetchCategories();
    fetchProducts();
  }

  async function updateBadge() {
    if(!userSession) return;
    const { data } = await supabase.from('cart_items').select('quantity').eq('profile_id', userSession.id);
    if(data) document.getElementById('cartBadge').textContent = data.reduce((a, b) => a + b.quantity, 0);
  }

  async function fetchCategories() {
    const { data } = await supabase.from('categories').select('*').order('name');
    if(data) {
      data.forEach(c => {
        document.getElementById('categoriesBox').innerHTML += `<div class="cat-card" onclick="setFilter('${c.id}', this)">${c.display_icon} ${c.name}</div>`;
      });
    }
  }

  window.setFilter = (id, el) => {
    document.querySelectorAll('.cat-card').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    activeCat = id;
    fetchProducts();
  }

  async function fetchProducts() {
    let q = supabase.from('products').select('*').order('created_at', { ascending: false });
    if (activeCat) q = q.eq('category_id', activeCat);
    
    const { data } = await q;
    const box = document.getElementById('productBox');
    
    if(!data || data.length === 0) return box.innerHTML = '<p style="color:var(--muted); grid-column:1/-1;">No models available in this configuration.</p>';

    box.innerHTML = data.map(p => {
      const price = p.discount_price ? p.discount_price : p.price;
      return `
      <div class="product-card">
        <div class="product-img" onclick="window.location.href='product.html?id=${p.id}'">
          <svg viewBox="0 0 280 160" fill="none"><path d="M40 110 L55 80 L85 62 L110 55 L175 54 L210 58 L240 78 L255 105 L255 118 L40 118 Z" fill="#222" stroke="#c9a84c" stroke-width="1.5"/></svg>
        </div>
        <div class="product-info">
          <div class="product-scale">${p.brand} | ${p.scale}</div>
          <div class="product-name" onclick="window.location.href='product.html?id=${p.id}'">${p.name}</div>
          <div class="price">₹${price/100}</div>
          <button class="btn-add" onclick="addCart('${p.id}', this)">Add to Cart</button>
        </div>
      </div>
    `}).join('');
  }

  // BULLETPROOF CART LOGIC - NO 409 ERRORS
  window.addCart = async (pid, btn) => {
    if (!userSession) return window.location.href = 'login.html';
    
    btn.disabled = true; btn.textContent = "Processing...";
    
    try {
      // Step 1: Safely check if the item is already there
      const { data: exist } = await supabase.from('cart_items').select('*').eq('profile_id', userSession.id).eq('product_id', pid).maybeSingle();
      
      if (exist) {
        // Step 2a: It exists, securely update the quantity
        await supabase.from('cart_items').update({ quantity: exist.quantity + 1 }).eq('id', exist.id);
      } else {
        // Step 2b: It does not exist, insert it
        const { error } = await supabase.from('cart_items').insert({ profile_id: userSession.id, product_id: pid, quantity: 1 });
        
        // Failsafe: If a double-click slips through and triggers a 409 Unique Conflict, catch it and update instead!
        if (error && (error.code === '23505' || error.message.includes('duplicate'))) {
          const { data: retry } = await supabase.from('cart_items').select('*').eq('profile_id', userSession.id).eq('product_id', pid).maybeSingle();
          if(retry) await supabase.from('cart_items').update({ quantity: retry.quantity + 1 }).eq('id', retry.id);
        }
      }
    } catch (e) { 
      console.error("Cart Action Managed:", e); 
    }
    
    await updateBadge();
    btn.disabled = false; btn.textContent = "Add to Cart";
    
    const toast = document.getElementById('toastBox');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CastWheelz — Premium Die Cast Models</title>
<link rel="icon" href="data:;base64,iVBORw0KGgo=">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --bg: #0a0a0a; --card: #161819; --border: #2a2b2e; --gold: #c9a84c; --white: #fff; --muted: #888; }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'DM Sans', sans-serif; }
  body { background: var(--bg); color: var(--white); padding-top: 70px; }
  
  nav { position: fixed; top: 0; width: 100%; height: 70px; background: rgba(10,10,10,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 5%; z-index: 100; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--gold); text-decoration: none; letter-spacing: 1px; }
  .nav-links { display: flex; gap: 15px; align-items: center; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--white); padding: 8px 16px; border-radius: 6px; cursor: pointer; text-decoration: none; font-size: 13px; text-transform: uppercase; font-weight: 600; }
  .btn-solid { background: var(--gold); border: none; color: #000; padding: 8px 16px; border-radius: 6px; cursor: pointer; text-decoration: none; font-weight: bold; font-size: 13px; text-transform: uppercase; }

  .hero { text-align: center; padding: 5rem 1rem; border-bottom: 1px solid var(--border); background: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #0a0a0a 100%); }
  .hero h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(40px, 6vw, 64px); margin-bottom: 10px; }
  .hero p { color: var(--muted); max-width: 500px; margin: 0 auto 2rem; font-size: 16px; }

  .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1rem; }
  .filters { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 2rem; scrollbar-width: none; }
  .filter-btn { background: var(--card); border: 1px solid var(--border); color: var(--white); padding: 10px 20px; border-radius: 8px; cursor: pointer; white-space: nowrap; font-weight: 500; transition: 0.2s; }
  .filter-btn:hover, .filter-btn.active { border-color: var(--gold); color: var(--gold); }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; display: flex; flex-direction: column; transition: transform 0.2s; }
  .card:hover { transform: translateY(-5px); border-color: var(--gold); }
  .card-img { background: #111; height: 180px; border-radius: 8px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .card-img svg { width: 70%; }
  .card-title { font-weight: 600; font-size: 16px; margin-bottom: 5px; cursor: pointer; line-height: 1.3; }
  .card-price { color: var(--gold); font-family: 'Bebas Neue', sans-serif; font-size: 26px; margin-bottom: 15px; margin-top: auto; }
  .btn-add { background: transparent; border: 1px solid var(--border); color: var(--white); padding: 12px; border-radius: 6px; cursor: pointer; font-weight: 600; text-transform: uppercase; width: 100%; transition: 0.2s; }
  .btn-add:hover { background: var(--gold); color: #000; border-color: var(--gold); }
  .btn-add:disabled { opacity: 0.5; cursor: not-allowed; }

  .toast { position: fixed; bottom: 20px; right: 20px; background: var(--card); border: 1px solid var(--gold); padding: 15px 20px; border-radius: 8px; transform: translateX(150%); transition: transform 0.3s; z-index: 1000; display: flex; align-items: center; gap: 10px; }
  .toast.show { transform: translateX(0); }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">CASTWHEELZ</a>
  <div class="nav-links">
    <a href="admin.html" class="btn-outline" style="border:none; color:var(--muted);">HQ Console</a>
    <button id="authBtn" class="btn-outline" onclick="window.location.href='login.html'">Login</button>
    <a href="cart.html" class="btn-solid">Cart (<span id="cartBadge">0</span>)</a>
  </div>
</nav>

<div class="hero">
  <h1>Precision Die-Cast Fleet</h1>
  <p>Authentic scale models synced directly to secure cloud ledgers.</p>
  <a href="#shop" class="btn-solid" style="display:inline-block; padding: 12px 24px;">Explore Catalog</a>
</div>

<div class="container" id="shop">
  <div class="filters" id="catFilters">
    <button class="filter-btn active" onclick="setFilter(null)">Show All</button>
  </div>
  <div class="grid" id="productGrid"><p style="color:var(--muted)">Synchronizing database...</p></div>
</div>

<div class="toast" id="toastComponent">🛒 <span id="toastMsg">Added to cart</span></div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
  const supabase = createClient('https://cjzvweakirjbmmacrqpk.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNqenZ3ZWFraXJqYm1tYWNycXBrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MTE4OTcsImV4cCI6MjA5NTA4Nzg5N30.OxP-RUwhi2i7OlFLZruBEh9MjgXhbkzYWT55mEDb-Hg')
  
  let currentUser = null;
  let activeFilter = null;

  async function init() {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      currentUser = session.user;
      const btn = document.getElementById('authBtn');
      btn.textContent = 'Logout';
      btn.onclick = async () => { await supabase.auth.signOut(); window.location.reload(); }
      updateBadge();
    }
    loadCategories();
    loadProducts();
  }

  async function updateBadge() {
    if(!currentUser) return;
    const { data } = await supabase.from('cart_items').select('quantity').eq('profile_id', currentUser.id);
    if(data) document.getElementById('cartBadge').textContent = data.reduce((sum, item) => sum + item.quantity, 0);
  }

  async function loadCategories() {
    const { data } = await supabase.from('categories').select('*');
    if(data) {
      const container = document.getElementById('catFilters');
      data.forEach(c => {
        container.innerHTML += `<button class="filter-btn" onclick="setFilter('${c.id}')">${c.display_icon} ${c.name}</button>`;
      });
    }
  }

  window.setFilter = (id) => { activeFilter = id; loadProducts(); }

  async function loadProducts() {
    let query = supabase.from('products').select('*').order('created_at', { ascending: false });
    if(activeFilter) query = query.eq('category_id', activeFilter);
    const { data } = await query;
    
    const grid = document.getElementById('productGrid');
    if(!data || data.length === 0) return grid.innerHTML = "<p style='color:var(--muted)'>No vehicles match this configuration.</p>";

    grid.innerHTML = data.map(p => `
      <div class="card">
        <div class="card-img" onclick="window.location.href='product.html?id=${p.id}'">
          <svg viewBox="0 0 280 160" fill="none"><path d="M40 110 L55 80 L85 62 L110 55 L175 54 L210 58 L240 78 L255 105 L255 118 L40 118 Z" fill="#222" stroke="#c9a84c" stroke-width="2"/></svg>
        </div>
        <div style="font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px;">${p.scale} | ${p.brand}</div>
        <div class="card-title" onclick="window.location.href='product.html?id=${p.id}'">${p.name}</div>
        <div class="card-price">₹${(p.discount_price || p.price)/100}</div>
        <button class="btn-add" onclick="addToCart('${p.id}', this)">Add to Cart</button>
      </div>
    `).join('');
  }

  window.addToCart = async (pid, btn) => {
    if(!currentUser) { alert("Please login to allocate fleet resources."); window.location.href='login.html'; return; }
    
    btn.disabled = true; btn.textContent = "Processing...";
    
    // Safely fetch existing without triggering 406 Not Acceptable
    const { data: exist } = await supabase.from('cart_items').select('id, quantity').eq('profile_id', currentUser.id).eq('product_id', pid).maybeSingle();
    const newQty = exist ? exist.quantity + 1 : 1;

    // Safely upsert without triggering 409 Conflict
    await supabase.from('cart_items').upsert(
      { profile_id: currentUser.id, product_id: pid, quantity: newQty },
      { onConflict: 'profile_id, product_id' }
    );
    
    await updateBadge();
    btn.disabled = false; btn.textContent = "Add to Cart";
    
    const toast = document.getElementById('toastComponent');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your Cart — CastWheelz</title>
<link rel="icon" href="data:;base64,iVBORw0KGgo=">
<style>
  body { background: #0a0a0a; color: #fff; font-family: sans-serif; padding: 2rem; }
  .item { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding: 1rem 0; }
</style>
</head>
<body>
<h1>Your Cart</h1>
<div id="cartList">Loading...</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
  const supabase = createClient('https://cjzvweakirjbmmacrqpk.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNqenZ3ZWFraXJqYm1tYWNycXBrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MTE4OTcsImV4cCI6MjA5NTA4Nzg5N30.OxP-RUwhi2i7OlFLZruBEh9MjgXhbkzYWT55mEDb-Hg')

  async function renderCart() {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) return document.getElementById('cartList').innerHTML = "Login required.";

    const { data: cart } = await supabase.from('cart_items').select('*').eq('profile_id', session.user.id);
    
    if (!cart || cart.length === 0) return document.getElementById('cartList').innerHTML = "Cart is empty.";

    let html = '';
    for (const item of cart) {
      const { data: prod } = await supabase.from('products').select('*').eq('id', item.product_id).single();
      if (prod) {
        html += `<div class="item">
                  <span>${prod.name} (x${item.quantity})</span>
                  <span>₹${(prod.price * item.quantity) / 100}</span>
                 </div>`;
      }
    }
    document.getElementById('cartList').innerHTML = html;
  }
  renderCart();
</script>
</body>
</html>

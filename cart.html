<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart — CastWheelz</title>
<link rel="icon" href="data:;base64,iVBORw0KGgo=">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<style>
  :root { --black: #0a0a0a; --card-bg: #161819; --border: #2a2b2e; --gold: #c9a84c; --white: #f4f2ee; --muted: #7a7d88; --red: #d63333; --font-display: 'Bebas Neue', sans-serif; --font-body: 'DM Sans', sans-serif; }
  body { background: var(--black); color: var(--white); font-family: var(--font-body); margin: 0; padding-top: 80px; }
  nav { position: fixed; top: 0; left: 0; right: 0; background: rgba(10,10,10,0.92); border-bottom: 1px solid var(--border); height: 68px; display: flex; align-items: center; padding: 0 2rem; z-index: 100; }
  .logo { font-family: var(--font-display); font-size: 26px; color: var(--gold); text-decoration: none; }
  
  .container { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; display: grid; grid-template-columns: 1fr 380px; gap: 3rem; align-items: start; }
  h1 { font-family: var(--font-display); font-size: 42px; margin-bottom: 2rem; }
  
  .cart-item { background: var(--card-bg); border: 1px solid var(--border); padding: 1.5rem; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .cart-price { font-family: var(--font-display); font-size: 24px; color: var(--gold); }
  .btn-remove { background: none; border: none; color: var(--red); cursor: pointer; text-decoration: underline; font-size: 13px; margin-top: 5px; }
  
  .summary { background: var(--card-bg); border: 1px solid var(--border); padding: 2rem; border-radius: 16px; position: sticky; top: 100px; }
  .summary h2 { font-family: var(--font-display); font-size: 28px; border-bottom: 1px solid var(--border); padding-bottom: 1rem; margin-bottom: 1.5rem; }
  .total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
  .total-row span:last-child { font-family: var(--font-display); font-size: 36px; color: var(--gold); }
  
  input, textarea { width: 100%; background: var(--black); border: 1px solid var(--border); color: var(--white); padding: 12px; border-radius: 6px; margin-bottom: 15px; font-family: inherit; }
  input:focus, textarea:focus { outline: none; border-color: var(--gold); }
  .btn-submit { width: 100%; background: var(--gold); color: #000; border: none; padding: 15px; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

  @media(max-width: 768px) { .container { grid-template-columns: 1fr; } .summary { position: static; } }
</style>
</head>
<body>

<nav><a href="index.html" class="logo">CASTWHEELZ</a></nav>

<div class="container">
  <div>
    <h1>Active Cart Ledger</h1>
    <div id="cartBox"><p style="color:var(--muted)">Fetching secure data...</p></div>
  </div>
  
  <div class="summary" id="summaryBox" style="display:none;">
    <h2>Order Summary</h2>
    <div class="total-row"><span style="color:var(--muted);text-transform:uppercase;font-size:12px;font-weight:bold;">Subtotal</span><span id="displayTotal">₹0</span></div>
    
    <button class="btn-submit" id="checkoutBtn" onclick="document.getElementById('checkoutForm').style.display='block'; this.style.display='none';">Proceed to Checkout</button>
    
    <div id="checkoutForm" style="display:none;">
      <input type="text" id="c-name" placeholder="Full Legal Name" required>
      <input type="tel" id="c-phone" placeholder="Mobile Number" required>
      <textarea id="c-address" rows="3" placeholder="Complete Shipping Address" required></textarea>
      <button class="btn-submit" onclick="executeOrder()">Pay Securely</button>
    </div>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
  const supabase = createClient('https://cjzvweakirjbmmacrqpk.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNqenZ3ZWFraXJqYm1tYWNycXBrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MTE4OTcsImV4cCI6MjA5NTA4Nzg5N30.OxP-RUwhi2i7OlFLZruBEh9MjgXhbkzYWT55mEDb-Hg')
  
  let sessionUser = null;
  let cartData = [];

  async function bootCart() {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) return document.getElementById('cartBox').innerHTML = "Authentication required. Please login.";
    sessionUser = session.user;

    const { data: rawCart } = await supabase.from('cart_items').select('*').eq('profile_id', sessionUser.id);
    if (!rawCart || rawCart.length === 0) {
      document.getElementById('cartBox').innerHTML = "Cart matrix is empty.";
      document.getElementById('summaryBox').style.display = 'none';
      return;
    }

    const pIds = rawCart.map(c => c.product_id);
    const { data: products } = await supabase.from('products').select('*').in('id', pIds);

    cartData = rawCart.map(cartRow => {
      const pData = products.find(p => p.id === cartRow.product_id);
      return { cart_id: cartRow.id, qty: cartRow.quantity, product: pData };
    }).filter(i => i.product);

    document.getElementById('cartBox').innerHTML = cartData.map(i => {
      const unitPrice = i.product.discount_price ? i.product.discount_price : i.product.price;
      return `
      <div class="cart-item">
        <div>
          <div style="font-weight:600;font-size:16px;">${i.product.name}</div>
          <div style="color:var(--muted);font-size:13px;margin-bottom:5px;">Qty: ${i.qty} | ${i.product.brand}</div>
          <button class="btn-remove" onclick="removeRow('${i.cart_id}')">Remove Item</button>
        </div>
        <div class="cart-price">₹${(unitPrice * i.qty) / 100}</div>
      </div>
    `}).join('');

    const totalPaisa = cartData.reduce((sum, i) => {
      const price = i.product.discount_price ? i.product.discount_price : i.product.price;
      return sum + (price * i.qty);
    }, 0);
    
    document.getElementById('displayTotal').textContent = `₹${totalPaisa / 100}`;
    document.getElementById('summaryBox').style.display = 'block';
  }

  window.removeRow = async (id) => {
    await supabase.from('cart_items').delete().eq('id', id);
    bootCart();
  }

  window.executeOrder = async () => {
    const name = document.getElementById('c-name').value;
    const phone = document.getElementById('c-phone').value;
    const addr = document.getElementById('c-address').value;
    if(!name || !phone || !addr) return alert("Please fill all logistical fields.");

    const totalPaisa = cartData.reduce((sum, i) => {
      const price = i.product.discount_price ? i.product.discount_price : i.product.price;
      return sum + (price * i.qty);
    }, 0);

    const opts = {
      key: "rzp_live_SskOYlu2pHt0Qp", 
      amount: totalPaisa, currency: "INR", name: "CastWheelz HQ",
      handler: async function (res) {
        await supabase.from('orders').insert({
          profile_id: sessionUser.id,
          customer_name: name,
          customer_email: sessionUser.email,
          customer_phone: phone,
          delivery_address: addr,
          total_amount: totalPaisa,
          razorpay_payment_id: res.razorpay_payment_id,
          payment_status: 'Paid',
          fulfillment_status: 'Unshipped'
        });
        
        await supabase.from('cart_items').delete().eq('profile_id', sessionUser.id);
        alert('Transaction successful. Order registered.');
        window.location.href = 'index.html';
      }
    };
    new Razorpay(opts).open();
  }

  bootCart();
</script>
</body>
</html>

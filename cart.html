<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart — CastWheelz</title>
<link rel="icon" href="data:;base64,iVBORw0KGgo=">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<style>
  :root { --bg: #0a0a0a; --card: #161819; --border: #2a2b2e; --gold: #c9a84c; --white: #fff; --muted: #888; --red: #d63333; }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'DM Sans', sans-serif; }
  body { background: var(--bg); color: var(--white); padding-top: 70px; }
  nav { position: fixed; top: 0; width: 100%; height: 70px; background: rgba(10,10,10,0.95); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 5%; z-index: 100; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--gold); text-decoration: none; }
  
  .container { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; display: grid; grid-template-columns: 1fr 380px; gap: 2rem; }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: 36px; margin-bottom: 1.5rem; }
  
  .cart-item { background: var(--card); border: 1px solid var(--border); padding: 1.5rem; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .cart-price { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--gold); }
  .btn-remove { background: transparent; border: none; color: var(--red); cursor: pointer; text-decoration: underline; font-size: 13px; margin-top: 5px; }

  .checkout-box { background: var(--card); border: 1px solid var(--border); padding: 2rem; border-radius: 12px; position: sticky; top: 90px; }
  .checkout-box input, .checkout-box textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--white); padding: 12px; border-radius: 6px; margin-bottom: 15px; font-family: inherit; }
  .btn-pay { width: 100%; background: var(--gold); color: #000; border: none; padding: 15px; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 1rem; }

  @media(max-width: 768px) { .container { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">CASTWHEELZ</a>
</nav>

<div class="container">
  <div>
    <h1>Your Fleet Ledger</h1>
    <div id="cartList"><p style="color:var(--muted)">Fetching secure data...</p></div>
  </div>
  
  <div class="checkout-box" id="checkoutUI" style="display:none;">
    <h2 style="font-family:'Bebas Neue'; font-size:28px; border-bottom:1px solid var(--border); padding-bottom:10px; margin-bottom:20px;">Order Summary</h2>
    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
      <span style="color:var(--muted);">Subtotal</span>
      <span style="font-family:'Bebas Neue'; font-size:32px; color:var(--gold);" id="cartTotal">₹0</span>
    </div>
    
    <div id="formSection" style="display:none;">
      <input type="text" id="c-name" placeholder="Full Name" required>
      <input type="tel" id="c-phone" placeholder="Phone Number" required>
      <textarea id="c-address" rows="3" placeholder="Shipping Address" required></textarea>
      <button class="btn-pay" onclick="processOrder()">Pay via Razorpay</button>
    </div>
    <button class="btn-pay" id="startCheckoutBtn" onclick="document.getElementById('formSection').style.display='block'; this.style.display='none';">Proceed to Checkout</button>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
  const supabase = createClient('https://cjzvweakirjbmmacrqpk.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNqenZ3ZWFraXJqYm1tYWNycXBrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MTE4OTcsImV4cCI6MjA5NTA4Nzg5N30.OxP-RUwhi2i7OlFLZruBEh9MjgXhbkzYWT55mEDb-Hg')
  
  let userSession = null;
  let finalCart = [];

  async function loadCart() {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) return document.getElementById('cartList').innerHTML = "Please login to view cart.";
    userSession = session;

    // 1. Fetch Cart
    const { data: cartItems } = await supabase.from('cart_items').select('*').eq('profile_id', session.user.id);
    if (!cartItems || cartItems.length === 0) {
      document.getElementById('cartList').innerHTML = "Your cart is empty.";
      document.getElementById('checkoutUI').style.display = 'none';
      return;
    }

    // 2. Extract IDs & Fetch Products manually (Avoids Foreign Key crashes)
    const productIds = cartItems.map(c => c.product_id);
    const { data: products } = await supabase.from('products').select('*').in('id', productIds);

    // 3. Merge locally
    finalCart = cartItems.map(item => {
      const p = products.find(prod => prod.id === item.product_id);
      return { cartId: item.id, quantity: item.quantity, product: p };
    }).filter(i => i.product);

    // 4. Render
    document.getElementById('cartList').innerHTML = finalCart.map(i => `
      <div class="cart-item">
        <div>
          <div style="font-weight:600; font-size:16px;">${i.product.name}</div>
          <div style="color:var(--muted); font-size:13px;">Qty: ${i.quantity} | Scale: ${i.product.scale}</div>
          <button class="btn-remove" onclick="removeItem('${i.cartId}')">Remove</button>
        </div>
        <div class="cart-price">₹${((i.product.discount_price || i.product.price) * i.quantity) / 100}</div>
      </div>
    `).join('');

    const total = finalCart.reduce((sum, i) => sum + ((i.product.discount_price || i.product.price) * i.quantity), 0);
    document.getElementById('cartTotal').textContent = `₹${total / 100}`;
    document.getElementById('checkoutUI').style.display = 'block';
  }

  window.removeItem = async (cartId) => {
    await supabase.from('cart_items').delete().eq('id', cartId);
    loadCart();
  }

  window.processOrder = async () => {
    const name = document.getElementById('c-name').value;
    const phone = document.getElementById('c-phone').value;
    const addr = document.getElementById('c-address').value;
    if(!name || !phone || !addr) return alert("Fill all details.");

    const total = finalCart.reduce((sum, i) => sum + ((i.product.discount_price || i.product.price) * i.quantity), 0);

    const opts = {
      key: "rzp_live_SskOYlu2pHt0Qp", 
      amount: total, currency: "INR", name: "CastWheelz",
      handler: async function (res) {
        const { data: order } = await supabase.from('orders').insert([{
          profile_id: userSession.user.id, customer_name: name, customer_email: userSession.user.email,
          customer_phone: phone, delivery_address: addr, total_amount: total, razorpay_payment_id: res.razorpay_payment_id, payment_status: 'Paid'
        }]).select().single();
        
        await supabase.from('cart_items').delete().eq('profile_id', userSession.user.id);
        alert('Success! Order ID: ' + order.id.substring(0,8));
        window.location.href = 'index.html';
      }
    };
    new Razorpay(opts).open();
  }

  loadCart();
</script>
</body>
</html>
